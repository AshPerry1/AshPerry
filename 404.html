<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>404 — Game Over | Ash Perry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="game-over-page">
    <div class="game-over-pellets" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>

    <div class="game-over-scene" aria-hidden="true">
      <svg class="game-over-ghost game-over-ghost-blinky" viewBox="0 0 48 56" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 8h32a8 8 0 0 1 8 8v24c0 0-6 8-12 4s-8-4-12 0-8 4-12 0-8-4-12 0V16a8 8 0 0 1 8-8z" fill="#c94a4a"/>
        <ellipse cx="18" cy="24" rx="5" ry="6" fill="#fff"/><ellipse cx="30" cy="24" rx="5" ry="6" fill="#fff"/>
        <circle cx="20" cy="26" r="2.5" fill="#1a3a8a"/><circle cx="32" cy="26" r="2.5" fill="#1a3a8a"/>
      </svg>
      <svg class="game-over-ghost game-over-ghost-pinky" viewBox="0 0 48 56" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 8h32a8 8 0 0 1 8 8v24c0 0-6 8-12 4s-8-4-12 0-8 4-12 0-8 4-12 0-8-4-12 0V16a8 8 0 0 1 8-8z" fill="#c896b0"/>
        <ellipse cx="18" cy="24" rx="5" ry="6" fill="#fff"/><ellipse cx="30" cy="24" rx="5" ry="6" fill="#fff"/>
        <circle cx="20" cy="26" r="2.5" fill="#1a3a8a"/><circle cx="32" cy="26" r="2.5" fill="#1a3a8a"/>
      </svg>
      <svg class="game-over-ghost game-over-ghost-inky" viewBox="0 0 48 56" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 8h32a8 8 0 0 1 8 8v24c0 0-6 8-12 4s-8-4-12 0-8 4-12 0-8-4-12 0V16a8 8 0 0 1 8-8z" fill="#4aadc8"/>
        <ellipse cx="18" cy="24" rx="5" ry="6" fill="#fff"/><ellipse cx="30" cy="24" rx="5" ry="6" fill="#fff"/>
        <circle cx="20" cy="26" r="2.5" fill="#1a3a8a"/><circle cx="32" cy="26" r="2.5" fill="#1a3a8a"/>
      </svg>
      <svg class="game-over-ghost game-over-ghost-clyde" viewBox="0 0 48 56" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 8h32a8 8 0 0 1 8 8v24c0 0-6 8-12 4s-8-4-12 0-8 4-12 0-8-4-12 0V16a8 8 0 0 1 8-8z" fill="#c9924e"/>
        <ellipse cx="18" cy="24" rx="5" ry="6" fill="#fff"/><ellipse cx="30" cy="24" rx="5" ry="6" fill="#fff"/>
        <circle cx="20" cy="26" r="2.5" fill="#1a3a8a"/><circle cx="32" cy="26" r="2.5" fill="#1a3a8a"/>
      </svg>
    </div>

    <main class="game-over-main">
      <p class="game-over-code">404 — PLAYER 1 GAVE UP</p>
      <h1 class="game-over-title">GAME OVER</h1>
      <p class="game-over-copy">
        This page doesn't exist.<br />
        Neither does your excuse to skip a great website.
      </p>
      <p class="game-over-sub">
        Wrong turn in the maze? Happens to the best of us.
      </p>
      <a class="game-over-btn" href="/">try again</a>
    </main>

    <div class="game-over-pellets game-over-pellets-bottom" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
  </body>
</html>
